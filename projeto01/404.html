<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página não encontrada | Aura Joias</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <script src="/assets/js/script.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="error-page">
    <main class="reveal error-content">
        <i data-lucide="help-circle" class="error-icon"></i>
        <h1 class="error-title">404</h1>
        <p class="tagline">Página Não Encontrada</p>
        <p class="error-desc">A joia que você procura pode ter sido movida
            ou não existe mais no nosso catálogo.</p>
        <a href="/" class="btn">Voltar ao Início</a>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
