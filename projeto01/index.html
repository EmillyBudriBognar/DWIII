<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Joias | Elegância & Brilho</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <section class="hero-container">
        <div class="hero-overlay"></div>
        <div class="glass-card reveal">
            <span class="tagline">Desde 1924</span>
            <h1>Aura Joias</h1>
            <p class="desc">
                A excelência da alta joalheria transformando luz em momentos eternos. Peças exclusivas criadas com a
                alma e a precisão da tradição centenária.
            </p>
            <div class="menu-horizontal">
                <a href="/quemsou" class="menu-card">
                    <i data-lucide="gem"></i>
                    <span>História</span>
                </a>
                <a href="/produtos" class="menu-card">
                    <i data-lucide="shopping-bag"></i>
                    <span>Coleções</span>
                </a>
                <a href="/perguntas" class="menu-card">
                    <i data-lucide="help-circle"></i>
                    <span>Dúvidas</span>
                </a>
            </div>
        </div>
    </section>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
